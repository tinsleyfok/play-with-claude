<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Play with Claude</title>
  <script>
    // GitHub Pages SPA redirect: converts the path into a query string
    // so index.html can restore it and let React Router handle it.
    var pathSegmentsToKeep = 1; // keep /play-with-claude
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
