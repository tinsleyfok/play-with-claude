<body>
  <script>
    // GitHub Pages SPA redirect: restores the real URL from the query string
    // set by 404.html so React Router can handle it.
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <div id="root"></div>
</body>
